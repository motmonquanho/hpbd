<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà Tặng - Bánh Kem Phép Thuật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(135deg, #fbcfe8 0%, #fef08a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(236, 72, 153, 0.3);
            border: 4px solid #f9a8d4;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        /* --- CSS VẼ BÁNH KEM --- */
        .cake-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 2rem auto;
        }

        /* Đế bánh */
        .plate {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            box-shadow: 0 10px 10px rgba(0,0,0,0.1);
            border-bottom: 6px solid #cbd5e1;
        }

        /* Tầng bánh dưới */
        .cake-bottom {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 90px;
            background: #f472b6; /* Màu hồng */
            border-radius: 20px;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.05);
            border: 4px solid #db2777;
        }

        /* Tầng bánh trên */
        .cake-top {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 70px;
            background: #fbbf24; /* Màu vàng */
            border-radius: 20px;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.05);
            border: 4px solid #d97706;
        }

        /* Kem chảy (Icing) */
        .icing {
            position: absolute;
            top: -4px;
            left: -4px;
            width: calc(100% + 8px);
            height: 30px;
            background: #fff;
            border-radius: 20px 20px 10px 10px;
            border: 4px solid #e2e8f0;
            border-bottom: none;
        }

        .icing::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 10%;
            width: 20px;
            height: 30px;
            background: #fff;
            border-radius: 0 0 20px 20px;
            border: 4px solid #e2e8f0;
            border-top: none;
            box-shadow: 40px 10px 0 -4px #fff, 40px 10px 0 0 #e2e8f0, 80px -5px 0 -4px #fff, 80px -5px 0 0 #e2e8f0;
        }

        /* Nến */
        .candle {
            position: absolute;
            bottom: 175px;
            width: 16px;
            height: 45px;
            background: repeating-linear-gradient(
                45deg,
                #fff,
                #fff 5px,
                #38bdf8 5px,
                #38bdf8 10px
            );
            border: 2px solid #0284c7;
            border-radius: 4px;
        }

        .candle-1 { left: 75px; }
        .candle-2 { left: 117px; bottom: 185px; } /* Nến giữa cao hơn */
        .candle-3 { left: 159px; }

        /* Ngọn lửa đỏ (Mặc định cháy) */
        .flame {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 28px;
            background: #ef4444; /* Đỏ rực */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 0 20px #ef4444, inset 0 0 10px #fcd34d;
            opacity: 1; /* Mặc định cháy sẵn */
            animation: flicker 0.6s infinite alternate; /* Hiệu ứng cháy */
            transition: opacity 0.5s ease-in-out; /* Tắt từ từ */
        }

        /* Animation khi lửa tắt */
        .flame.extinguished {
            opacity: 0;
            animation: none;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-2deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(2deg); }
        }

        /* Màn hình khởi động để xin quyền Mic */
        #startOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Thanh đo âm lượng */
        .volume-meter {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }
        
        .volume-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #34d399, #fcd34d, #ef4444);
            transition: width 0.1s ease;
        }

        /* Hiệu ứng pháo giấy */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f472b6;
            animation: fall linear forwards;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

    </style>
</head>
<body>

    <!-- Nhạc sinh nhật -->
    <audio id="birthdayMusic" loop>
        <source src="nhac-sinh-nhat.mp3" type="audio/mpeg">
    </audio>

    <!-- Màn hình khởi động -->
    <div id="startOverlay">
        <div class="text-6xl mb-4 animate-bounce">🎂</div>
        <h1 class="text-3xl font-black text-pink-600 mb-4 uppercase">Đã đến lúc ước nguyện!</h1>
        <p class="text-gray-600 font-bold mb-8 max-w-sm">
            Hãy chuẩn bị sẵn một điều ước thật đẹp ở trong đầu nhé.
        </p>
        <button onclick="startMagic()" class="bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black py-4 px-10 rounded-full shadow-xl hover:scale-105 transition-transform text-lg uppercase tracking-wider">
            Bắt đầu
        </button>
    </div>

    <!-- Giao diện Bánh Kem -->
    <div class="main-card">
        <h2 class="text-2xl font-black text-pink-600 mb-2 uppercase">Bánh Kem Phép Thuật</h2>
        <p class="text-sm font-bold text-gray-500 mb-6" id="instructionText">
            🎙️ Hãy nhắm mắt ước nguyện xong, rồi thổi thật mạnh vào điện thoại để tắt nến nhé!
        </p>

        <!-- Vẽ Bánh Kem -->
        <div class="cake-container">
            <div class="plate"></div>
            
            <div class="cake-bottom">
                <div class="icing"></div>
            </div>
            
            <div class="cake-top">
                <div class="icing"></div>
            </div>

            <div class="candle candle-1">
                <div class="flame" id="flame1"></div>
            </div>
            <div class="candle candle-2">
                <div class="flame" id="flame2"></div>
            </div>
            <div class="candle candle-3">
                <div class="flame" id="flame3"></div>
            </div>
        </div>

        <!-- Thanh hiển thị độ lớn âm thanh -->
        <div class="volume-meter" id="volMeterContainer">
            <div class="volume-fill" id="volFill"></div>
        </div>

        <div id="successMessage" class="hidden mt-6 bg-green-100 border-2 border-green-300 text-green-800 font-bold p-4 rounded-xl shadow-inner animate-pulse text-lg">
            ✨ Phùuu! Nến đã được thổi tắt! Chúc Mừng Sinh Nhật <span id="playerNameCake" class="text-pink-600 font-black uppercase"></span>! ✨
        </div>

        <a href="index.html" class="inline-block mt-8 text-sm font-bold text-gray-400 hover:text-pink-500 underline transition-colors">
            Quay lại trang chủ
        </a>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let isExtinguished = false;
        let animationId;

        // Hàm tách lấy Chữ lót và Tên
        function extractFirstName(fullName) {
            if (!fullName) return "Bạn";
            const parts = fullName.trim().split(/\s+/);
            if (parts.length > 1) {
                return parts.slice(1).join(" "); 
            }
            return fullName;
        }

        // Lấy tên từ bộ nhớ khi trang tải xong
        document.addEventListener('DOMContentLoaded', () => {
            const fullName = localStorage.getItem('dogGame_playerName') || "Bạn ơi";
            const shortName = extractFirstName(fullName);
            document.getElementById('playerNameCake').innerText = shortName;
        });

        async function startMagic() {
            // 1. Ẩn màn hình khởi động
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('volMeterContainer').style.display = 'block';

            // Bật nhạc sinh nhật ngay từ đầu
            const music = document.getElementById('birthdayMusic');
            music.volume = 0.6;
            music.play().catch(e => console.log("Lỗi phát nhạc: ", e));

            // 2. Yêu cầu quyền truy cập Micro
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Khởi tạo AudioContext
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; // Tốc độ phân tích
                
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                // Bắt đầu vòng lặp kiểm tra âm thanh
                checkAudioVolume();

            } catch (err) {
                alert("Ôi, để thổi nến được thì hệ thống cần mượn Micro một xíu. Bạn hãy tải lại trang và ấn Cho phép nhé!");
                console.error("Lỗi Microphone:", err);
                document.getElementById('instructionText').innerText = "❌ Lỗi: Bạn chưa cấp quyền truy cập Micro.";
                document.getElementById('instructionText').classList.add('text-red-500');
            }
        }

        function checkAudioVolume() {
            if (isExtinguished) return; // Nếu nến đã tắt thì dừng kiểm tra

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            // Tính trung bình cường độ âm thanh
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let averageVolume = sum / dataArray.length;

            // Hiển thị thanh âm lượng trên UI
            const volPercent = Math.min((averageVolume / 100) * 100, 100);
            document.getElementById('volFill').style.width = volPercent + '%';

            // NẾU ÂM THANH LỚN (Ngưỡng > 50) -> THỔI TẮT NẾN
            if (averageVolume > 50) {
                extinguishCandles();
            } else {
                animationId = requestAnimationFrame(checkAudioVolume);
            }
        }

        function extinguishCandles() {
            isExtinguished = true;
            
            // Tắt lửa cho 3 cây nến
            document.getElementById('flame1').classList.add('extinguished');
            document.getElementById('flame2').classList.add('extinguished');
            document.getElementById('flame3').classList.add('extinguished');

            // Cập nhật UI
            document.getElementById('volMeterContainer').style.display = 'none';
            document.getElementById('instructionText').style.display = 'none';
            document.getElementById('successMessage').classList.remove('hidden');

            // Hiệu ứng pháo giấy
            createConfetti();
        }

        // Hiệu ứng pháo giấy
        function createConfetti() {
            const colors = ['#f472b6', '#fbbf24', '#38bdf8', '#34d399', '#ef4444'];
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = -Math.random() * 50 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const size = Math.random() * 8 + 6;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }
    </script>
</body>
</html>
