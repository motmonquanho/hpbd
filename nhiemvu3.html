<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhiệm Vụ 3 - Bí Mật Ngày Sinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(135deg, #fce7f3 0%, #ede9fe 100%);
            min-height: 100vh;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 40px -10px rgba(236, 72, 153, 0.2);
            border: 4px solid #fbcfe8;
        }

        .question-box {
            background: linear-gradient(to right, #fdf2f8, #faf5ff);
            border: 2px dashed #f472b6;
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.3);
        }

        .option-btn:active {
            transform: translateY(1px);
        }

        /* Modal Kết Quả */
        #resultModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            border: 6px solid #fbcfe8;
            box-shadow: 0 25px 50px -12px rgba(236, 72, 153, 0.4);
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content.show {
            transform: scale(1);
            opacity: 1;
        }

        /* Hiệu ứng hoa giấy (Confetti) */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f472b6;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* Màn hình Loading */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #fce7f3;
            border-radius: 50%;
            border-top-color: #ec4899;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">
    <!-- ========================================== -->
    <!-- PHẦN 1: HTML NHẠC NỀN (DÁN VÀO SAU THẺ BODY) -->
    <!-- ========================================== -->
    <audio id="bgMusic" loop>
        <source src="nhac-nen.mp3" type="audio/mpeg">
    </audio>

    <button id="musicToggle" class="fixed top-4 right-4 z-[9999] bg-white/80 backdrop-blur-sm w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full shadow-lg border-2 border-yellow-300 text-xl sm:text-2xl hover:scale-110 transition-transform cursor-pointer">
        🔇
    </button>
    <!-- ========================================== -->

    <!-- Màn hình tải dữ liệu -->
    <div id="loadingOverlay">
        <div class="spinner mb-4"></div>
        <p class="text-pink-600 font-bold animate-pulse text-lg">Đang đọc bản đồ sao...</p>
    </div>

    <!-- Khung nội dung chính -->
    <div class="main-card p-6 md:p-10 text-center max-w-lg w-full relative overflow-hidden hidden" id="mainContent">
        <div class="text-5xl mb-4 animate-bounce">✨</div>
        <h1 class="text-3xl font-black text-pink-600 mb-2">Câu Hỏi Tinh Tú</h1>
        <p class="text-gray-500 font-semibold mb-8">Hãy chọn một đáp án mà bạn cho là đúng nhất nhé!</p>

        <!-- Hộp câu hỏi -->
        <div class="question-box p-6 rounded-2xl mb-8 shadow-inner">
            <p class="text-xl md:text-2xl font-bold text-gray-800 leading-relaxed" id="questionText">
                Ngày <span class="text-pink-500 underline decoration-pink-300 decoration-4">...</span> là ngày gì và thuộc cung gì?
            </p>
        </div>

        <!-- Các nút đáp án (Sẽ được tạo bằng JS) -->
        <div id="optionsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <!-- Buttons go here -->
        </div>

        <a href="index.html" class="inline-block mt-4 text-sm font-bold text-gray-400 hover:text-red-500 underline transition-colors">
            Quay lại trang chủ (Hủy nhiệm vụ)
        </a>
    </div>

    <!-- Modal Kết Quả -->
    <div id="resultModal">
        <div class="modal-content max-w-sm w-full p-8 text-center relative mx-4" id="modalBox">
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 text-7xl drop-shadow-lg">👑</div>
            <h2 class="text-2xl font-black text-purple-600 mt-6 mb-4">Bí Mật Bật Mí!</h2>
            
            <div class="bg-purple-50 rounded-2xl p-6 mb-6 border border-purple-100 shadow-inner">
                <p class="text-lg font-bold text-gray-700 leading-relaxed">
                    Là Ngày sinh của một <span class="text-pink-500 font-black">NGƯỜI XINH ĐẸP</span><br>
                    và thuộc cung <span id="resultZodiac" class="text-purple-600 font-black text-2xl uppercase block mt-2">...</span>
                </p>
            </div>

            <button onclick="completeTask()" class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white font-black py-4 px-6 rounded-2xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all transform uppercase tracking-wider">
                Hoàn Thành Nhiệm Vụ 3
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // PHẦN 2: JAVASCRIPT NHẠC NỀN (DÁN VÀO ĐẦU THẺ SCRIPT)
        // ==========================================
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        
        let isMusicPlaying = localStorage.getItem('dogGame_musicPlaying') === 'true';
        let savedTime = parseFloat(localStorage.getItem('dogGame_musicTime')) || 0;
        
        bgMusic.volume = 0.5;
        
        if (savedTime > 0) {
            bgMusic.currentTime = savedTime;
        }

        function playMusic() {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicToggle.innerText = '🔊';
                localStorage.setItem('dogGame_musicPlaying', 'true');
            }).catch(e => {
                musicToggle.innerText = '🔇';
                isMusicPlaying = false;
            });
        }

        if (isMusicPlaying) {
            playMusic();
        }

        document.body.addEventListener('click', () => {
            if (!isMusicPlaying && localStorage.getItem('dogGame_musicPlaying') !== 'false') {
                playMusic();
            }
        }, { once: true });

        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                musicToggle.innerText = '🔇';
                localStorage.setItem('dogGame_musicPlaying', 'false');
            } else {
                playMusic();
            }
        });

        setInterval(() => {
            if (isMusicPlaying) {
                localStorage.setItem('dogGame_musicTime', bgMusic.currentTime);
            }
        }, 500);

        window.addEventListener('beforeunload', () => {
            if (isMusicPlaying) {
                localStorage.setItem('dogGame_musicTime', bgMusic.currentTime);
            }
        });
        // ==========================================
        // --- CẤU HÌNH ---
        // THAY BẰNG URL APP SCRIPT CỦA BẠN NHÉ!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtEGfB0xd3yHecrAcD61F9ZPj1UJvgQ8IH2Pmyr-06BQMUPZLVrmw7xYds_C6nkgKq/exec"; 

        const allZodiacs = [
            "Bạch Dương", "Kim Ngưu", "Song Tử", "Cự Giải", 
            "Sư Tử", "Xử Nữ", "Thiên Bình", "Thiên Yết", 
            "Nhân Mã", "Ma Kết", "Bảo Bình", "Song Ngư"
        ];

        let actualZodiac = "Không xác định";
        let formattedDate = "...";

        document.addEventListener('DOMContentLoaded', () => {
            const playerName = localStorage.getItem('dogGame_playerName');
            
            if (!playerName) {
                // Nếu chạy test không có tên, dùng ngày mặc định
                processData("2010-08-15");
                return;
            }

            // Gọi API lấy dữ liệu ngày sinh
            fetch(`${SCRIPT_URL}?action=getUserInfo&playerName=${encodeURIComponent(playerName)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.dob) {
                        processData(data.dob);
                    } else {
                        // Mặc định nếu người chơi không có ngày sinh trong sheet
                        processData("2010-08-15");
                    }
                })
                .catch(error => {
                    console.error("Lỗi API:", error);
                    processData("2010-08-15");
                });
        });

        function processData(dobString) {
            // Chuyển đổi chuỗi ngày sinh thành Object Date
            const dob = new Date(dobString);
            
            if (isNaN(dob.getTime())) {
                formattedDate = dobString; // Fallback
                actualZodiac = "Bí Ẩn";
            } else {
                const day = dob.getDate();
                const month = dob.getMonth() + 1; // getMonth trả về 0-11
                const year = dob.getFullYear();
                
                formattedDate = `${day < 10 ? '0'+day : day}/${month < 10 ? '0'+month : month}/${year}`;
                actualZodiac = calculateZodiac(day, month);
            }

            // Hiển thị câu hỏi
            document.getElementById('questionText').innerHTML = `Ngày <span class="text-pink-500 underline decoration-pink-300 decoration-4">${formattedDate}</span> là ngày gì và thuộc cung gì?`;
            
            // Render nút đáp án
            renderOptions();

            // Ẩn loading, hiện nội dung
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
        }

        // Tính toán cung hoàng đạo chính xác
        function calculateZodiac(day, month) {
            if ((month == 1 && day <= 19) || (month == 12 && day >= 22)) return "Ma Kết";
            if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Bảo Bình";
            if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "Song Ngư";
            if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Bạch Dương";
            if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Kim Ngưu";
            if ((month == 5 && day >= 21) || (month == 6 && day <= 21)) return "Song Tử";
            if ((month == 6 && day >= 22) || (month == 7 && day <= 22)) return "Cự Giải";
            if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Sư Tử";
            if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Xử Nữ";
            if ((month == 9 && day >= 23) || (month == 10 && day <= 23)) return "Thiên Bình";
            if ((month == 10 && day >= 24) || (month == 11 && day <= 21)) return "Thiên Yết";
            if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Nhân Mã";
            return "Bí Ẩn";
        }

        function renderOptions() {
            const grid = document.getElementById('optionsGrid');
            
            // Lọc bỏ cung đúng khỏi danh sách random
            const otherZodiacs = allZodiacs.filter(z => z !== actualZodiac);
            
            // Xáo trộn mảng và lấy 3 cung sai
            otherZodiacs.sort(() => Math.random() - 0.5);
            const selectedOptions = [actualZodiac, otherZodiacs[0], otherZodiacs[1], otherZodiacs[2]];
            
            // Xáo trộn 4 đáp án
            selectedOptions.sort(() => Math.random() - 0.5);

            grid.innerHTML = '';
            selectedOptions.forEach((zodiac) => {
                const btn = document.createElement('button');
                btn.className = "option-btn bg-white border-2 border-pink-200 text-pink-700 font-bold py-4 px-6 rounded-2xl shadow-sm hover:bg-pink-50 hover:border-pink-400 focus:outline-none";
                btn.innerText = `Cung ${zodiac}`;
                // Bất kể chọn đáp án nào cũng gọi hàm showResult
                btn.onclick = () => showResult();
                grid.appendChild(btn);
            });
        }

        function showResult() {
            const modal = document.getElementById('resultModal');
            const modalBox = document.getElementById('modalBox');
            
            document.getElementById('resultZodiac').innerText = actualZodiac;
            
            modal.style.display = 'flex';
            // Trigger animation
            setTimeout(() => {
                modalBox.classList.add('show');
                createConfetti();
            }, 10);
        }

        // Hiệu ứng pháo giấy rực rỡ
        function createConfetti() {
            const colors = ['#f472b6', '#c084fc', '#fbbf24', '#60a5fa', '#34d399'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = Math.random() * 2 + 1 + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function completeTask() {
            // Đánh dấu nhiệm vụ 3 hoàn thành
            let completed = JSON.parse(localStorage.getItem('dogGame_completedTasks')) || [];
            if (!completed.includes(3)) {
                completed.push(3);
            }
            localStorage.setItem('dogGame_completedTasks', JSON.stringify(completed));

            // Trả về trang chủ và cộng điểm
            window.location.href = "index.html?return=true";
        }
    </script>
</body>
</html>
